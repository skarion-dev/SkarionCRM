name: Check HR Schema State (temp)
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check hr schema
        working-directory: apps/employee-portal
        run: npx tsx src/scripts/check-hr-schema-temp.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
