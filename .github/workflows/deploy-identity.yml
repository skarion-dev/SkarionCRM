name: Deploy Identity (Cloudflare)

# Deploys the identity Worker + its two Pages sites (admin, login) on push
# to this branch. Deliberately scoped to cloudflare-platform-rewrite only -
# mirrors how Kimi's deploy-to-cloudflare.yml is scoped to cloudflare-deploy
# only - so neither workflow fires on the other's branch and neither
# deployment overwrites the other (different Worker/Pages project names
# too, see apps/identity/wrangler.toml).
#
# Secrets used (CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, DATABASE_URL,
# JWT_SECRET) already exist in this repo's secrets, confirmed via Kimi's
# own deploy-to-cloudflare.yml on the cloudflare-deploy branch. Still
# missing, add under Settings -> Secrets and variables -> Actions before
# expecting a full deploy to succeed (the Worker will deploy either way,
# but email/MFA/invitations will error at runtime without them):
#   Secrets: RESEND_API_KEY, MFA_ENCRYPTION_KEY, INVITATION_TOKEN_PEPPER
#   Variables (not secret - it's a public URL): IDENTITY_API_URL,
#     e.g. https://skarion-identity.<your-subdomain>.workers.dev or
#     https://auth.skarion.com once the custom domain is attached.

on:
  push:
    branches: [main, cloudflare-platform-rewrite]
  workflow_dispatch:

jobs:
  migrate:
    name: Run identity schema migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Apply identity migrations
        working-directory: apps/identity
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-worker:
    name: Deploy identity Worker
    runs-on: ubuntu-latest
    needs: [migrate]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skarion/identity typecheck

      - name: Install wrangler CLI
        run: npm install -g wrangler@3

      - name: Verify Cloudflare API token
        run: |
          curl -s -X GET "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | head -c 200
          echo ""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy Worker
        working-directory: apps/identity
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set DATABASE_URL secret
        working-directory: apps/identity
        run: printf '%s' "$DATABASE_URL" | wrangler secret put DATABASE_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Set JWT_SECRET secret
        working-directory: apps/identity
        run: printf '%s' "$JWT_SECRET" | wrangler secret put JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
      - name: Set RESEND_API_KEY secret
        working-directory: apps/identity
        run: printf '%s' "$RESEND_API_KEY" | wrangler secret put RESEND_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      - name: Set MFA_ENCRYPTION_KEY secret
        working-directory: apps/identity
        run: printf '%s' "$MFA_ENCRYPTION_KEY" | wrangler secret put MFA_ENCRYPTION_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MFA_ENCRYPTION_KEY: ${{ secrets.MFA_ENCRYPTION_KEY }}
      - name: Set INVITATION_TOKEN_PEPPER secret
        working-directory: apps/identity
        run: printf '%s' "$INVITATION_TOKEN_PEPPER" | wrangler secret put INVITATION_TOKEN_PEPPER
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INVITATION_TOKEN_PEPPER: ${{ secrets.INVITATION_TOKEN_PEPPER }}

  deploy-login:
    name: Deploy public login Pages site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install wrangler CLI
        run: npm install -g wrangler@3
      - name: Build login
        working-directory: apps/identity/login
        run: pnpm build
        env:
          VITE_IDENTITY_API_URL: ${{ vars.IDENTITY_API_URL }}
      - name: Ensure Pages project exists
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"skarion-identity-login","production_branch":"main"}' || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Pages
        working-directory: apps/identity/login
        run: wrangler pages deploy dist --project-name=skarion-identity-login --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}


  deploy-admin:
    name: Deploy identity admin Pages site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install wrangler CLI
        run: npm install -g wrangler@3
      - name: Build admin
        working-directory: apps/identity/admin
        run: pnpm build
        env:
          VITE_IDENTITY_API_URL: ${{ vars.IDENTITY_API_URL }}
      - name: Ensure Pages project exists
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"skarion-identity-admin","production_branch":"main"}' || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Pages
        working-directory: apps/identity/admin
        run: wrangler pages deploy dist --project-name=skarion-identity-admin --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}