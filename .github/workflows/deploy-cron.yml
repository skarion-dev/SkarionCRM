name: Deploy Cron Worker

on:
  push:
    branches: [main, cloudflare-platform-rewrite]
    paths:
      - 'apps/workers/cron/**'
      - 'packages/db-kit/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-cron.yml'
  workflow_dispatch:

concurrency:
  group: deploy-cron-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy cron Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install wrangler CLI
        run: npm install -g wrangler@3

      - name: Deploy cron Worker
        working-directory: apps/workers/cron
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set WORKFLOW_RUNNER_SECRET secret
        working-directory: apps/workers/cron
        run: printf '%s' "$WORKFLOW_RUNNER_SECRET" | wrangler secret put WORKFLOW_RUNNER_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKFLOW_RUNNER_SECRET: ${{ secrets.WORKFLOW_RUNNER_SECRET }}

      - name: Set WORKFLOW_RUNNER_URL variable
        working-directory: apps/workers/cron
        run: wrangler vars put WORKFLOW_RUNNER_URL --value "https://skarion-workflow-runner.alsaki1999.workers.dev"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
