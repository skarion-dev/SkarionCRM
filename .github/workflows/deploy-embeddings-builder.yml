name: Deploy Embeddings Builder

on:
  push:
    branches: [main, cloudflare-platform-rewrite]
    paths:
      - 'apps/workers/embeddings-builder/**'
      - 'packages/db-kit/**'
      - 'apps/crm/src/db/schema.ts'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-embeddings-builder.yml'
  workflow_dispatch:

concurrency:
  group: deploy-embeddings-builder-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy embeddings-builder Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skarion/crm typecheck
      - name: Install wrangler CLI
        run: npm install -g wrangler@3

      - name: Deploy embeddings-builder Worker
        working-directory: apps/workers/embeddings-builder
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set DATABASE_URL secret
        working-directory: apps/workers/embeddings-builder
        run: printf '%s' "$DATABASE_URL" | wrangler secret put DATABASE_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Set GOOGLE_API_KEY secret
        working-directory: apps/workers/embeddings-builder
        run: printf '%s' "$GOOGLE_API_KEY" | wrangler secret put GOOGLE_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      - name: Set GOOGLE_EMBEDDING_MODEL secret
        working-directory: apps/workers/embeddings-builder
        run: printf '%s' "$GOOGLE_EMBEDDING_MODEL" | wrangler secret put GOOGLE_EMBEDDING_MODEL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GOOGLE_EMBEDDING_MODEL: ${{ secrets.GOOGLE_EMBEDDING_MODEL }}
