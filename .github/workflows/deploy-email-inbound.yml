name: Deploy Email Inbound Worker

on:
  push:
    branches: [main, cloudflare-platform-rewrite]
    paths:
      - 'apps/workers/email-inbound/**'
      - 'packages/db-kit/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-email-inbound.yml'
  workflow_dispatch:

concurrency:
  group: deploy-email-inbound-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy email-inbound Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install wrangler CLI
        run: npm install -g wrangler@3

      - name: Deploy email-inbound Worker
        working-directory: apps/workers/email-inbound
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set DATABASE_URL secret
        working-directory: apps/workers/email-inbound
        run: printf '%s' "$DATABASE_URL" | wrangler secret put DATABASE_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Set RESEND_API_KEY secret
        working-directory: apps/workers/email-inbound
        run: printf '%s' "$RESEND_API_KEY" | wrangler secret put RESEND_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
