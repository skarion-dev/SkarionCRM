name: Deploy Workflow Runner

on:
  push:
    branches: [main, cloudflare-platform-rewrite]
    paths:
      - 'apps/workers/workflow-runner/**'
      - 'packages/db-kit/**'
      - 'apps/crm/src/db/schema.ts'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-workflow-runner.yml'
  workflow_dispatch:

concurrency:
  group: deploy-workflow-runner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy workflow-runner Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install wrangler CLI
        run: npm install -g wrangler@3

      - name: Deploy workflow-runner Worker
        working-directory: apps/workers/workflow-runner
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set DATABASE_URL secret
        working-directory: apps/workers/workflow-runner
        run: printf '%s' "$DATABASE_URL" | wrangler secret put DATABASE_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Set WORKFLOW_RUNNER_SECRET secret
        working-directory: apps/workers/workflow-runner
        run: printf '%s' "$WORKFLOW_RUNNER_SECRET" | wrangler secret put WORKFLOW_RUNNER_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKFLOW_RUNNER_SECRET: ${{ secrets.WORKFLOW_RUNNER_SECRET }}
