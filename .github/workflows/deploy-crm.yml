name: deploy-crm
on:
  push:
    branches: [cloudflare-platform-rewrite]
    paths:
      - 'apps/crm/**'
      - 'packages/permissions/**'
      - 'packages/importers/**'
      - 'packages/db-kit/**'
      - 'packages/auth-client/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-crm.yml'

concurrency:
  group: deploy-crm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate:
    name: Run Drizzle migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd apps/crm && pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-worker:
    name: Deploy CRM Worker
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skarion/crm typecheck
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/crm
          command: deploy

      # `env:` on the deploy step above only sets vars for the GH Actions
      # runner process - it does NOT inject them into the deployed Worker.
      # Workers secrets only exist at runtime if pushed via
      # `wrangler secret put`, same as deploy-identity.yml does. Without
      # this, c.env.DATABASE_URL and c.env.JWT_SECRET are undefined in the
      # live Worker - every DB-backed and auth-checked route would fail.
      - name: Set DATABASE_URL secret
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/crm
          command: secret put DATABASE_URL --value "${{ secrets.DATABASE_URL }}"
      - name: Set JWT_SECRET secret
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/crm
          command: secret put JWT_SECRET --value "${{ secrets.JWT_SECRET }}"

  # Pages is deployed via Cloudflare's GitHub integration (auto-build on push).
  # Project: skarion-crm | Branch: cloudflare-platform-rewrite | Root: apps/crm/web
