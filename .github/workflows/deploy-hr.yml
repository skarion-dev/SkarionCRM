name: Deploy HR (Cloudflare)

on:
  push:
    branches: [main]
    paths:
      - 'apps/employee-portal/**'
      - 'apps/employee-portal/web/**'
      - 'packages/permissions/**'
      - 'packages/db-kit/**'
      - 'packages/auth-client/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-hr.yml'
  workflow_dispatch:

concurrency:
  group: deploy-hr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate:
    name: Run Drizzle migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd apps/employee-portal && pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-worker:
    name: Deploy HR Worker
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skarion/employee-portal typecheck
      - name: Install wrangler CLI
        run: npm install -g wrangler@3

      - name: Deploy HR Worker
        working-directory: apps/employee-portal
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set DATABASE_URL secret
        working-directory: apps/employee-portal
        run: printf '%s' "$DATABASE_URL" | wrangler secret put DATABASE_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Set JWT_SECRET secret
        working-directory: apps/employee-portal
        run: printf '%s' "$JWT_SECRET" | wrangler secret put JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
      - name: Set GIT_BRANCH secret
        working-directory: apps/employee-portal
        run: printf '%s' "$GITHUB_REF_NAME" | wrangler secret put GIT_BRANCH
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Set GIT_COMMIT_SHA secret
        working-directory: apps/employee-portal
        run: printf '%s' "$GITHUB_SHA" | wrangler secret put GIT_COMMIT_SHA
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Set ALLOWED_ORIGINS variable
        working-directory: apps/employee-portal
        run: wrangler vars put ALLOWED_ORIGINS --value "${{ vars.VITE_ALLOWED_ORIGINS || '' }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-pages:
    name: Deploy HR Pages site
    needs: deploy-worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install wrangler CLI
        run: npm install -g wrangler@3
      - name: Build HR Pages
        working-directory: apps/employee-portal/web
        run: pnpm build
        env:
          VITE_API_URL: ${{ vars.VITE_HR_API_URL || vars.VITE_API_URL || 'https://skarion-hr-platform.skarion-talentos.workers.dev' }}
          VITE_IDENTITY_API_URL: ${{ vars.VITE_IDENTITY_API_URL || 'https://skarion-identity.skarion-talentos.workers.dev' }}
          VITE_IDENTITY_LOGIN_URL: ${{ vars.VITE_IDENTITY_LOGIN_URL || 'https://skarion-identity-login-4hu.pages.dev' }}
      - name: Deploy to Cloudflare Pages
        working-directory: apps/employee-portal/web
        run: wrangler pages deploy dist --project-name=skarion-hr --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
