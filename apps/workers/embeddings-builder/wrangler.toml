name = "skarion-embeddings-builder"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

# Cron trigger: run every 15 minutes to (re)embed changed records.
[[triggers]]
crons = ["*/15 * * * *"]

[vars]
GOOGLE_EMBEDDING_MODEL = "embedding-001"
