<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Real CSP enforcement is in public/_headers (Cloudflare Pages picks it
      up as actual HTTP response headers). frame-ancestors specifically is
      NOT honored via a meta tag per spec - only the real header works - so
      it's deliberately omitted here to avoid a false sense of protection.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:8787 https://*.skarion.com; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://assets.skarion.com;" />
    <title>Sign in to Skarion</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
